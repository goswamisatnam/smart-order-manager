openapi: 3.0.3
info:
  title: Smart Order Manager - Hospitality Order Orchestrator API
  description: |
    Order Orchestrator Application for Hospitality following Traveler MMF Specification.
    This API manages hospitality orders using the Microservice Orchestrator pattern
    with Apache Camel Saga for distributed transaction management.

    ## Traveler MMF Specification
    The API follows the Traveler Minimum Marketable Feature specification for hospitality,
    supporting guest profiles, dietary preferences, room service, dining, and amenity orders.
  version: 1.0.0
  contact:
    name: Smart Order Manager Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Orders
    description: Order management operations
  - name: Health
    description: Health check operations

paths:
  /api/v1/orders:
    post:
      tags:
        - Orders
      summary: Create a new hospitality order
      description: |
        Creates a new order and initiates the Saga orchestration flow.
        The orchestrator coordinates inventory reservation, payment processing,
        and kitchen/service notification steps.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Orders
      summary: Retrieve all orders
      description: Retrieves all orders with optional filtering by status or traveler ID.
      operationId: getAllOrders
      parameters:
        - name: travelerId
          in: query
          required: false
          schema:
            type: string
          description: Filter orders by traveler ID
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrderStatus'
          description: Filter orders by status
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number for pagination
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size for pagination
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Retrieve an order by ID
      description: Retrieves the details of a specific order including saga status.
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Orders
      summary: Modify an existing order
      description: |
        Modifies an existing order. Triggers the modify saga which coordinates
        inventory adjustments, payment recalculation, and service updates.
      operationId: modifyOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyOrderRequest'
      responses:
        '200':
          description: Order modified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Order cannot be modified in current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/orders/{orderId}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel an existing order
      description: |
        Cancels an existing order. Triggers the cancel saga which coordinates
        inventory release, payment refund, and service cancellation.
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Order cannot be cancelled in current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    CreateOrderRequest:
      type: object
      required:
        - travelerId
        - orderType
        - items
        - propertyId
      properties:
        travelerId:
          type: string
          description: Unique identifier for the traveler/guest
          example: "TRV-001"
        travelerName:
          type: string
          description: Full name of the traveler
          example: "John Doe"
        propertyId:
          type: string
          description: Hospitality property identifier (hotel, resort, etc.)
          example: "PROP-HILTON-NYC-001"
        roomNumber:
          type: string
          description: Room number for delivery (if applicable)
          example: "1205"
        orderType:
          $ref: '#/components/schemas/OrderType'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemRequest'
        specialInstructions:
          type: string
          description: Special instructions or requests from the traveler
          example: "Please deliver after 7 PM"
        dietaryPreferences:
          type: array
          items:
            $ref: '#/components/schemas/DietaryPreference'
        scheduledTime:
          type: string
          format: date-time
          description: Scheduled delivery/service time
        priority:
          $ref: '#/components/schemas/OrderPriority'

    ModifyOrderRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
        specialInstructions:
          type: string
          description: Updated special instructions
        scheduledTime:
          type: string
          format: date-time
          description: Updated scheduled time
        roomNumber:
          type: string
          description: Updated room number
        priority:
          $ref: '#/components/schemas/OrderPriority'

    CancelOrderRequest:
      type: object
      properties:
        reason:
          type: string
          description: Reason for cancellation
          example: "Changed plans"

    OrderItemRequest:
      type: object
      required:
        - itemId
        - itemName
        - quantity
        - unitPrice
      properties:
        itemId:
          type: string
          description: Menu/catalog item identifier
          example: "ITEM-001"
        itemName:
          type: string
          description: Name of the item
          example: "Club Sandwich"
        quantity:
          type: integer
          minimum: 1
          description: Quantity ordered
          example: 2
        unitPrice:
          type: number
          format: double
          minimum: 0
          description: Price per unit
          example: 15.99
        customizations:
          type: string
          description: Item-specific customizations
          example: "No onions, extra cheese"

    OrderResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
          description: Unique order identifier
        travelerId:
          type: string
          description: Traveler identifier
        travelerName:
          type: string
          description: Traveler name
        propertyId:
          type: string
          description: Property identifier
        roomNumber:
          type: string
          description: Room number
        orderType:
          $ref: '#/components/schemas/OrderType'
        status:
          $ref: '#/components/schemas/OrderStatus'
        sagaStatus:
          $ref: '#/components/schemas/SagaStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
        totalAmount:
          type: number
          format: double
          description: Total order amount
        specialInstructions:
          type: string
        dietaryPreferences:
          type: array
          items:
            $ref: '#/components/schemas/DietaryPreference'
        scheduledTime:
          type: string
          format: date-time
        priority:
          $ref: '#/components/schemas/OrderPriority'
        cancellationReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderItemResponse:
      type: object
      properties:
        itemId:
          type: string
        itemName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: double
        subtotal:
          type: number
          format: double
        customizations:
          type: string

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "UP"
        service:
          type: string
          example: "order-orchestrator"
        timestamp:
          type: string
          format: date-time

    OrderType:
      type: string
      enum:
        - ROOM_SERVICE
        - RESTAURANT_DINING
        - BAR_LOUNGE
        - SPA_WELLNESS
        - AMENITY_REQUEST
        - LAUNDRY
        - CONCIERGE
      description: Type of hospitality order

    OrderStatus:
      type: string
      enum:
        - PENDING
        - CONFIRMED
        - PREPARING
        - IN_TRANSIT
        - DELIVERED
        - COMPLETED
        - MODIFIED
        - CANCELLED
        - FAILED
      description: Current status of the order

    SagaStatus:
      type: string
      enum:
        - STARTED
        - INVENTORY_RESERVED
        - PAYMENT_PROCESSED
        - SERVICE_NOTIFIED
        - COMPLETED
        - COMPENSATING
        - COMPENSATED
        - FAILED
      description: Current status of the saga orchestration

    DietaryPreference:
      type: string
      enum:
        - VEGETARIAN
        - VEGAN
        - GLUTEN_FREE
        - DAIRY_FREE
        - NUT_FREE
        - HALAL
        - KOSHER
        - NONE
      description: Dietary preference/restriction

    OrderPriority:
      type: string
      enum:
        - LOW
        - NORMAL
        - HIGH
        - URGENT
      description: Priority level for the order
